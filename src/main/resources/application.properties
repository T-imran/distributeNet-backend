spring.application.name=distribnet

# Database
# spring.datasource.url=jdbc:postgresql://localhost:5432/distribnet
# spring.datasource.username=distribnet
# spring.datasource.password=password
# spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:h2:mem:distribnet;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
# PostgreSQL settings are kept here for reference.

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true

# H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
jwt.secret=changeit-changeit-changeit-changeit-changeit-changeit
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Server
server.port=${PORT:8080}
